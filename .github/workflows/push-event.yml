name: Push

on:
  push:
    branches: ["flutter"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**.png'
      - '**.jpg'
      - '**.jpeg'
      - '**.gif'
      - '**.svg'
      - '**.webp'
      - '**.txt'
      - '**.arb'

env:
  ANDROID_EMULATOR_API: 34
  ANDROID_EMULATOR_ARCH: x86_64
  IPHONE_DEVICE_MODEL: iPhone 16 Pro Max
  IPAD_DEVICE_MODEL: iPad Pro 13-inch (M4)

jobs:
  common:
    name: Common Build
    runs-on: ubuntu-latest
    outputs:
      VERSION_NAME: ${{ steps.flutter-version.outputs.VERSION_NAME }}
      VERSION_CODE: ${{ steps.flutter-version.outputs.VERSION_CODE }}
    steps:
      - uses: actions/checkout@v4

      - name: Common Workflow
        uses: ./.github/actions/common

      - name: Hydrate and Update Version
        id: flutter-version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Get commit message
          commit_message=$(git log -1 --pretty=format:"%s")
          
          git clone --branch=version https://${{ github.repository_owner }}:${{ github.token }}@github.com/${{ github.repository }} version
          cd version

          # Read and increment version name
          IFS='.' read -r major minor patch < versionName.txt

          if [[ "$commit_message" =~ ^feat: ]]; then
            next_minor=$((minor + 1))
            next_patch=0
          else
            next_minor=$((minor))
            next_patch=$((patch + 1))
          fi
          next_version_name="$major.$next_minor.$next_patch"
          echo "VERSION_NAME=$next_version_name" >> $GITHUB_OUTPUT
          echo "$next_version_name" > versionName.txt

          # Read and increment version code
          read -r version_code < versionCode.txt
          
          new_version_code=$((version_code + 1))
          echo "VERSION_CODE=$new_version_code" >> $GITHUB_OUTPUT
          echo "$new_version_code" > versionCode.txt

          # Force push to version branch
          git checkout --orphan temporary
          git add --all .
          git commit -am "[Auto] Update versionName: $next_version_name & versionCode: $new_version_code ($(date +%Y-%m-%d.%H:%M:%S))"
          git branch -D version
          git branch -m version
          git push --force origin version

  android:
    name: Android Flutter Build
    needs: common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Build Keys
        if: ${{ github.repository == 'fossasia/pslab-app' }}
        env:
          ENCRYPTED_F10B5E0E5262_IV: ${{ secrets.ENCRYPTED_F10B5E0E5262_IV }}
          ENCRYPTED_F10B5E0E5262_KEY: ${{ secrets.ENCRYPTED_F10B5E0E5262_KEY }}
        run: |
          bash scripts/prep-android-key.sh

      - name: Android Workflow
        uses: ./.github/actions/android
        with:
          STORE_PASS: ${{ secrets.STORE_PASS }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
          VERSION_NAME: ${{needs.common.outputs.VERSION_NAME}}
          VERSION_CODE: ${{needs.common.outputs.VERSION_CODE}}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK Generated
          path: build/app/outputs/flutter-apk

      - name: Upload AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: AAB Generated
          path: build/app/outputs/bundle

      - name: Update app in Open Testing track
        if: ${{ github.repository == 'fossasia/pslab-app' }}
        run: |
          git clone --branch=fastlane-android --depth=1 https://${{ github.repository_owner }}:${{ github.token }}@github.com/${{ github.repository }} fastlane
          fastlane uploadToOpenTesting
          if [[ $? -ne 0 ]]; then
              exit 1
          fi

  ios:
    name: iOS Flutter Build
    needs: common
    runs-on: macos-latest
    steps:
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: '16.4.0'
          
      - uses: actions/checkout@v4

      - name: Prepare Build Keys
        if: ${{ github.repository == 'fossasia/pslab-app' }}
        env:
          ENCRYPTED_IOS_IV: ${{ secrets.ENCRYPTED_IOS_IV }}
          ENCRYPTED_IOS_KEY: ${{ secrets.ENCRYPTED_IOS_KEY }}
        run: |
          bash scripts/prep-ios-key.sh

      - name: Setup Certs
        if: ${{ github.repository == 'fossasia/pslab-app' }}
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          cd ./iOS
          git clone --branch=fastlane-ios --depth=1 https://${{ github.repository_owner }}:${{ github.token }}@github.com/${{ github.repository }} fastlane
          fastlane setupCertificates
          if [[ $? -ne 0 ]]; then
              exit 1
          fi    

      - name: iOS Workflow
        uses: ./.github/actions/ios
        with:
          VERSION_NAME: ${{needs.common.outputs.VERSION_NAME}}
          VERSION_CODE: ${{needs.common.outputs.VERSION_CODE}}

      - name: Push app to testflight
        if: ${{ github.repository == 'fossasia/pslab-app' }}
        run: |
          cd ./iOS
          fastlane uploadToBeta
          if [[ $? -ne 0 ]]; then
              exit 1
          fi        

  update-release:
    name: Update Draft Release
    needs: [ common, android, ios, windows, linux, linux-arm64, macos ]
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: ${{ needs.common.outputs.VERSION_NAME }}

  screenshots-android:
    name: Screenshots (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Android Screenshot Workflow
        uses: ./.github/actions/screenshot-android
        with:
          ANDROID_EMULATOR_API: ${{ env.ANDROID_EMULATOR_API }}
          ANDROID_EMULATOR_ARCH: ${{ env.ANDROID_EMULATOR_ARCH }}

  screenshots-iphone:
    name: Screenshots (iPhone)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: '16.4.0'

      - uses: actions/checkout@v4

      - name: iPhone Screenshot Workflow
        uses: ./.github/actions/screenshot-iphone
        with:
          IPHONE_DEVICE_MODEL: ${{ env.IPHONE_DEVICE_MODEL }}
  
  screenshots-ipad:
    name: Screenshots (iPad)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: '16.4.0'

      - uses: actions/checkout@v4

      - name: iPad Screenshot Workflow
        uses: ./.github/actions/screenshot-ipad
        with:
          IPAD_DEVICE_MODEL: ${{ env.IPAD_DEVICE_MODEL }}
  
  windows:
    name: Windows Flutter Build
    needs: common
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Windows Workflow
        uses: ./.github/actions/windows
        with:
          VERSION_NAME: ${{needs.common.outputs.VERSION_NAME}}
          VERSION_CODE: ${{needs.common.outputs.VERSION_CODE}}

      - name: Upload installer to apk branch
        if: ${{ github.repository == 'fossasia/pslab-app' }}
        shell: bash
        run: |
          # Upload Windows installer as artifact instead of pushing to apk branch
          # This will be collected by the publish-apk job
          mkdir -p artifacts/windows
          cp -v build/windows/x64/installer/Release/*.exe artifacts/windows/
          
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows Installer
          path: artifacts/windows
  
  linux:
    name: Linux Flutter Build
    needs: common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Linux Workflow
        uses: ./.github/actions/linux
        with:
          VERSION_NAME: ${{needs.common.outputs.VERSION_NAME}}
          VERSION_CODE: ${{needs.common.outputs.VERSION_CODE}}
      
      - name: Upload packages to apk branch
        if: ${{ github.repository == 'fossasia/pslab-app' }}
        run: |
          # Upload Linux packages as artifact instead of pushing to apk branch
          # This will be collected by the publish-apk job
          mkdir -p artifacts/linux
          cp -v *.deb artifacts/linux/
          cp -v *.rpm artifacts/linux/
          
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux Packages
          path: artifacts/linux

  linux-arm64:
    name: Linux ARM64 Flutter Build
    needs: common
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Linux ARM64 Workflow
        uses: ./.github/actions/linux-arm64
        with:
          VERSION_NAME: ${{needs.common.outputs.VERSION_NAME}}
          VERSION_CODE: ${{needs.common.outputs.VERSION_CODE}}
      
      - name: Upload packages to apk branch
        if: ${{ github.repository == 'fossasia/pslab-app' }}
        run: |
          # Upload Linux ARM64 packages as artifact instead of pushing to apk branch
          # This will be collected by the publish-apk job
          mkdir -p artifacts/linux-arm64
          cp -v *.deb artifacts/linux-arm64/
          cp -v *.rpm artifacts/linux-arm64/
          
      - name: Upload Linux ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux ARM64 Packages
          path: artifacts/linux-arm64

  macos:
    name: macOS Flutter Build
    needs: common
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: macOS Workflow
        uses: ./.github/actions/macos
        with:
          VERSION_NAME: ${{needs.common.outputs.VERSION_NAME}}
          VERSION_CODE: ${{needs.common.outputs.VERSION_CODE}}
      
      - name: Upload dmg to apk branch
        if: ${{ github.repository == 'fossasia/pslab-app' }}
        run: |
          # Upload macOS DMG as artifact instead of pushing to apk branch
          # This will be collected by the publish-apk job
          mkdir -p artifacts/macos
          cp -v ../*.dmg artifacts/macos/
          
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS DMG
          path: artifacts/macos

  publish-apk:
    name: Publish to APK Branch
    needs: [android, windows, linux, linux-arm64, macos]
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'fossasia/pslab-app' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          pattern: '*'
          merge-multiple: false

      - name: Checkout apk branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin apk
          git checkout apk

      - name: Prepare apk branch contents
        run: |
          branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          echo "Branch: $branch"
          
          # Remove old files for this branch
          echo "Removing previous builds from branch: $branch"
          rm -rf pslab-$branch* || true
          rm -rf windows/* || true
          rm -rf linux/* || true
          rm -rf linux-arm64/* || true
          rm -rf macos/* || true
          
          # Create directories
          mkdir -p windows linux linux-arm64 macos
          
          # Copy Android APK/AAB files
          if [ -d "downloaded-artifacts/APK Generated" ]; then
            echo "Copying Android APK files..."
            find downloaded-artifacts/APK Generated -type f -name '*release.apk' -exec cp -v {} . \;
          fi
          if [ -d "downloaded-artifacts/AAB Generated" ]; then
            echo "Copying Android AAB files..."
            find downloaded-artifacts/AAB Generated -type f -name '*release.aab' -exec cp -v {} . \;
          fi
          
          # Rename Android files
          for file in app*.apk app*.aab; do
            if [ -f "$file" ]; then
              mv "$file" "pslab-$branch-${file#*-}"
            fi
          done
          
          # Copy Windows installer
          if [ -d "downloaded-artifacts/Windows Installer" ]; then
            echo "Copying Windows installer..."
            cp -v downloaded-artifacts/Windows Installer/*.exe windows/
          fi
          
          # Copy Linux packages
          if [ -d "downloaded-artifacts/Linux Packages" ]; then
            echo "Copying Linux packages..."
            cp -v downloaded-artifacts/Linux Packages/*.deb linux/
            cp -v downloaded-artifacts/Linux Packages/*.rpm linux/
          fi
          
          # Copy Linux ARM64 packages
          if [ -d "downloaded-artifacts/Linux ARM64 Packages" ]; then
            echo "Copying Linux ARM64 packages..."
            cp -v downloaded-artifacts/Linux ARM64 Packages/*.deb linux-arm64/
            cp -v downloaded-artifacts/Linux ARM64 Packages/*.rpm linux-arm64/
          fi
          
          # Copy macOS DMG
          if [ -d "downloaded-artifacts/macOS DMG" ]; then
            echo "Copying macOS DMG..."
            cp -v downloaded-artifacts/macOS DMG/*.dmg macos/
          fi
          
          # Show what we're committing
          echo "Final apk branch contents:"
          ls -la
          find . -type f -name "*" | head -20

      - name: Commit and push apk branch
        run: |
          branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          git add --all .
          git commit -am "[Auto] Update all builds from $branch ($(date +%Y-%m-%d.%H:%M:%S))"
          git push origin apk
